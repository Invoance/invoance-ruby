# Auto-publish to RubyGems via Trusted Publishing (OIDC) when a tag matching
# `v*` is pushed. No RubyGems API key required — and it works for the very first
# release of a new gem, too.
#
# We do NOT use rubygems/release-gem here: that action runs `rake release`, which
# creates + pushes the git tag itself. Since this workflow is *triggered by* a
# pushed tag, that would fail on an already-existing tag. Instead we set up OIDC
# credentials and `gem push` directly.
#
# To release:
#   1. Bump VERSION in lib/invoance/version.rb, update CHANGELOG.md, commit, push.
#   2. Tag and push:
#        git tag v0.1.0 -m "0.1.0"
#        git push origin v0.1.0
#
# One-time RubyGems Trusted Publishing setup (no token, new gem OK):
#   rubygems.org -> Profile -> Trusted Publishers -> Create (for a new gem):
#        RubyGems gem name: invoance
#        Repository:        Invoance/invoance-ruby
#        Workflow filename: release.yml
#        Environment:       (leave blank)

name: Release to RubyGems

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write        # to create the GitHub Release
  id-token: write        # required for RubyGems Trusted Publishing OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Verify tag matches version.rb
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(grep -oE 'VERSION = "[^"]+"' lib/invoance/version.rb | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$TAG" != "$PKG" ]; then
            echo "ERROR: tag $GITHUB_REF_NAME does not match version.rb $PKG" >&2
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches version.rb $PKG"

      - run: bundle exec rspec

      - name: Configure RubyGems OIDC credentials (Trusted Publishing)
        uses: rubygems/configure-rubygems-credentials@v2.1.0

      - name: Build and push the gem
        run: |
          gem build invoance.gemspec
          gem push invoance-*.gem

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            See [CHANGELOG](CHANGELOG.md) for details.

            ```bash
            gem install invoance
            ```
